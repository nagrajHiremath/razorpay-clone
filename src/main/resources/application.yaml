spring:
  application:
    name: razorpay-clone

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/razorpay_clone_dev}
    username: ${DB_USER:user}
    password: ${DB_PASS:password}

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
